name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  cpp-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential
      - name: Build and run C++ tests
        run: |
          cd ios/Classes/cpp
          cmake -S . -B build
          cmake --build build
          ./build/tuner_test

